version: "3.7"
 
services:
  invenio-cli:
    build: .
    image: invenio-cli-test
    container_name: invenio-cli-13-test
    hostname: invenio-cli-test

    environment:
        - LC_ALL=en_US.utf-8
        - LANG=en_US.utf-8

    volumes: # Note that volumes are mounted at runtime, not build time
      - ./data:/opt/app-root/data
      # - /var/run/docker.sock:/var/run/docker.sock

