[uwsgi]
# NOTE:  If running behind a nginx proxy, then you have to change the protocol from http to socket so that it can
# take incoming requests
#socket = 0.0.0.0:5000
http = 0.0.0.0:5000
stats = 0.0.0.0:9000
module = invenio_app.wsgi:application
master = true
die-on-term = true
processes = 2
threads = 2
single-interpreter = true
buffer-size = 10240
